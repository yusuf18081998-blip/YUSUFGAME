<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | Portal</title>
    <style>
        :root { --neon: #00fff2; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        header { background: #16213e; padding: 20px; border-bottom: 4px solid var(--neon); }
        h1 { color: var(--neon); letter-spacing: 5px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 30px; max-width: 1200px; margin: auto; }
        
        .game-card {
            background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155;
            cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 18px;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* O'yin oynasi - aynan sayt ichida */
        #game-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .back-btn {
            position: absolute; top: 15px; left: 15px; background: var(--neon);
            color: #000; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>YUSUFGAME</h1>
</header>

<div class="grid">
    <div class="game-card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=37754b0394014977936166164d1f563d')">🤺 Stickman Duelist</div>
    <div class="game-card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=4842cc7a9504446487593c20058b883d')">🏍️ Moto X3M</div>
    <div class="game-card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=6078e88931104336a5a3a27f677d2d14')">🏃 Subway Surfers</div>
    <div class="game-card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=9928509c132f41858a74e5428614660e')">🎱 8 Ball Pool</div>
</div>

<div id="game-modal">
    <div class="back-btn" onclick="closeGame()">ORQAGA QAYTISH</div>
    <iframe id="game-frame" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock" 
            allowfullscreen="true" 
            src=""></iframe>
</div>

<script>
    function openGame(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('game-modal').style.display = 'block';
        document.body.style.overflow = 'hidden'; // Saytni orqada qimirlamaydigan qilish
    }

    function closeGame() {
        document.getElementById('game-modal').style.display = 'none';
        document.getElementById('game-frame').src = ''; // O'yinni to'xtatish
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
