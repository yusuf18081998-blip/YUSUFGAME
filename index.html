<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | 1000+ O'yinlar Portali</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        header {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            height: 60px; display: flex; align-items: center; justify-content: center;
            border-bottom: 3px solid #38bdf8; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 100; position: relative;
        }
        header h1 { color: #38bdf8; font-size: 24px; text-transform: uppercase; letter-spacing: 4px; }

        .game-container {
            width: 100%;
            height: calc(100vh - 60px);
            background: #000;
        }

        /* Eng ishonchli o'yin portali iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>YUSUFGAME</h1>
    </header>

    <div class="game-container">
        <iframe src="https://www.gameflare.com/embed/" allowfullscreen></iframe>
    </div>

</body>
</html>
