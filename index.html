<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | O'yinlar Markazi</title>
    <style>
        :root { --neon: #00fff2; --bg: #0b0e14; --card: #16213e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        header {
            background: linear-gradient(90deg, #1e293b, #0b0e14);
            padding: 20px; text-align: center; border-bottom: 4px solid var(--neon);
            position: sticky; top: 0; z-index: 1000;
        }
        header h1 { color: var(--neon); letter-spacing: 5px; text-transform: uppercase; }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .game-card {
            background: var(--card); border-radius: 12px; padding: 20px;
            text-align: center; border: 1px solid #1f2937; cursor: pointer;
            transition: 0.3s; color: white; font-weight: bold;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }
        .icon { font-size: 35px; display: block; margin-bottom: 10px; }

        /* O'yin oynasi - Full Screen Modal */
        #game-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        #game-frame { width: 100%; height: 100%; border: none; }
        .back-btn {
            position: absolute; top: 15px; left: 15px;
            background: var(--neon); color: #000; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 10000;
            box-shadow: 0 0 10px #000;
        }
    </style>
</head>
<body>

<header>
    <h1>YUSUFGAME</h1>
</header>

<div class="container">
    <div class="grid">
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=37754b0394014977936166164d1f563d')"><span class="icon">🤺</span>Stickman Duelist</div>
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=4842cc7a9504446487593c20058b883d')"><span class="icon">🏍️</span>Moto X3M</div>
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=9928509c132f41858a74e5428614660e')"><span class="icon">🎱</span>8 Ball Pool</div>
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=6078e88931104336a5a3a27f677d2d14')"><span class="icon">🏃</span>Subway Surfers</div>
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=50f61d2b864a4c588e3984e727936553')"><span class="icon">🏎️</span>Drift Race</div>
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=92003c40751944609825b7a1e0f06f52')"><span class="icon">🥷</span>Shadow Ninja</div>
        <div class="game-card" onclick="playGame('https://html5.api.gamedistribution.com/main.html?gameid=b56a93557e0444369e97c11f71df4239')"><span class="icon">♟️</span>Chess Online</div>
    </div>
</div>

<div id="game-screen">
    <div class="back-btn" onclick="exitGame()">← ORQAGA</div>
    <iframe id="game-frame" src="" allow="autoplay; fullscreen; keyboard"></iframe>
</div>

<script>
    function playGame(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('game-screen').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function exitGame() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('game-frame').src = '';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
