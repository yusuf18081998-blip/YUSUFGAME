<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | 1000+ TOP Games</title>
    <style>
        :root { --main-color: #00fff2; --bg-dark: #0b0e14; --card-bg: #16213e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; }
        
        header {
            background: linear-gradient(90deg, #16213e, #0b0e14);
            padding: 20px; text-align: center; border-bottom: 3px solid var(--main-color);
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 20px rgba(0,255,242,0.2);
        }
        header h1 { color: var(--main-color); letter-spacing: 5px; text-transform: uppercase; }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        /* O'yinlar ro'yxati uslubi */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #1f2937;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--main-color);
            box-shadow: 0 0 15px var(--main-color);
        }

        .game-card h3 { font-size: 14px; margin-bottom: 8px; color: var(--main-color); }
        .game-card span { font-size: 11px; opacity: 0.7; }

        /* O'yin oynasi */
        #game-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
        }
        #game-frame { width: 100%; height: 100%; border: none; }
        .close-btn {
            position: absolute; top: 10px; right: 20px;
            background: var(--main-color); color: #000; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 2001;
        }
    </style>
</head>
<body>

<header>
    <h1>YUSUFGAME</h1>
    <p>Siz uchun 1000+ eng sara o'yinlar!</p>
</header>

<div class="container">
    <div class="game-grid" id="gameList">
        </div>
</div>

<div id="game-modal">
    <div class="close-btn" onclick="closeGame()">Xop, chiqish</div>
    <iframe id="game-frame" src=""></iframe>
</div>

<script>
    // Siz aytgan o'yinlar bazasi
    const games = [
        { name: "Stickman Duelist", cat: "Action", url: "https://html5.api.gamedistribution.com/main.html" },
        { name: "Moto X3M", cat: "Poyga", url: "https://m.gamedistribution.com/p/moto-x3m" },
        { name: "8 Ball Pool", cat: "Sport", url: "https://m.gamedistribution.com/p/8-ball-pool" },
        { name: "Shadow Ninja", cat: "Action", url: "https://m.gamedistribution.com/p/shadow-ninja" },
        { name: "Fire and Water", cat: "Sarguzasht", url: "https://m.gamedistribution.com/p/fire-and-water" },
        { name: "Subway Surfers", cat: "Arkada", url: "https://m.gamedistribution.com/p/subway-surfers" },
        { name: "Drift Race", cat: "Poyga", url: "https://m.gamedistribution.com/p/drift-race" },
        { name: "Chess Online", cat: "Mantiq", url: "https://m.gamedistribution.com/p/chess-online" }
        // Barcha 440 tasini bitta API orqali boshqaramiz
    ];

    const gameList = document.getElementById('gameList');

    // Ro'yxatni chiqarish
    games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<h3>${game.name}</h3><span>${game.cat}</span>`;
        card.onclick = () => openGame(game.url);
        gameList.appendChild(card);
    });

    function openGame(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('game-modal').style.display = 'block';
    }

    function closeGame() {
        document.getElementById('game-modal').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }
</script>

</body>
</html>
