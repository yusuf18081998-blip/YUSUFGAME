<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | 1000+ Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0b0e14; }
        
        /* Yuqori panel */
        header {
            background: #16213e; height: 60px; display: flex; 
            align-items: center; justify-content: center;
            border-bottom: 3px solid #00fff2; position: fixed; width: 100%; top: 0;
        }
        header h1 { color: #00fff2; font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 3px; }

        /* O'yinlar joylashadigan asosiy qism */
        #game-container {
            margin-top: 60px;
            width: 100%;
            height: calc(100vh - 60px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>YUSUFGAME</h1>
    </header>

    <div id="game-container">
        <iframe src="https://html5.api.gamedistribution.com/main.html" allowfullscreen></iframe>
    </div>

</body>
</html>
