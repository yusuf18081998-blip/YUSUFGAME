<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | O'yinlar Markazi</title>
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00ffcc; text-transform: uppercase; letter-spacing: 5px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; padding: 20px;
        }
        .game-card {
            background: #1a1f29; border-radius: 15px; overflow: hidden;
            transition: 0.3s; border: 2px solid #333; text-align: center;
            cursor: pointer; text-decoration: none; color: white;
        }
        .game-card:hover { transform: scale(1.05); border-color: #00ffcc; box-shadow: 0 0 20px #00ffcc; }
        .game-card img { width: 100%; height: 150px; object-fit: cover; }
        .game-card h3 { margin: 10px 0; }
        .category-tag { font-size: 12px; background: #e94560; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>YUSUFGAME</h1>
    <p style="text-align: center;">Har qanday o'yinlar to'plami</p>

    <div class="grid-container">
        
        <a href="https://bit.ly/4cz0Wai" class="game-card">
            <img src="https://img.freepik.com/free-photo/neon-racing-car-speeding-night_23-2150800537.jpg" alt="Neon Speedster">
            <h3>Neon Speedster</h3>
            <span class="category-tag">3D Poyga</span>
        </a>

        <a href="https://tinyurl.com/yusufgame" class="game-card">
            <img src="https://as1.ftcdn.net/v2/jpg/05/52/94/89/1000_F_552948951_zFlXvI3V1Y9P7S3v4A9O7UoYv7V9O6.jpg" alt="Brain Battle Blitz">
            <h3>Brain Battle</h3>
            <span class="category-tag">2-Kishilik / Quiz</span>
        </a>

        <div class="game-card" style="opacity: 0.5;">
            <div style="height: 150px; display: flex; align-items: center; justify-content: center;">➕</div>
            <h3>Yaqinda...</h3>
            <p>Yangi o'yin yaratilmoqda</p>
        </div>

    </div>

</body>
</html>
