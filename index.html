<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | O'yinlar Markazi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        header {
            background: #1e293b; padding: 15px; text-align: center;
            border-bottom: 3px solid #38bdf8; position: sticky; top: 0; z-index: 1000;
        }
        header h1 { color: #38bdf8; font-size: 28px; letter-spacing: 2px; }

        /* O'yinlar joylashadigan asosiy konteyner */
        .container {
            width: 100%;
            height: calc(100vh - 70px);
            background: #000;
        }

        /* Bu portal bloklanmaydi va sayt ichida ochiladi */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>YUSUFGAME</h1>
    </header>

    <div class="container">
        <iframe src="https://www.gameflare.com/embed/" allowfullscreen></iframe>
    </div>

</body>
</html>
