<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | 1000+ O'yinlar Markazi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        
        header {
            background: #1e293b; padding: 15px; text-align: center;
            border-bottom: 3px solid #38bdf8; position: sticky; top: 0; z-index: 100;
        }
        header h1 { color: #38bdf8; font-size: 28px; text-transform: uppercase; }

        /* O'yinlar turadigan joy */
        .game-frame-container {
            width: 100%;
            height: calc(100vh - 70px); /* Ekran bo'yiga to'liq moslashadi */
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-bar {
            background: #1e293b; padding: 10px; text-align: center;
            font-size: 12px; color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>YUSUFGAME Portal</h1>
    </header>

    <div class="game-frame-container">
        <iframe src="https://html5.gamemonetize.com/manager/showcase/" allowfullscreen></iframe>
    </div>

    <div class="footer-bar">
        YUSUFGAME - 1000 dan ortiq interaktiv o'yinlar jamlanmasi
    </div>

</body>
</html>
