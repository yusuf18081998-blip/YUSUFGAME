<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | O'yinlar Markazi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        
        header {
            background: #1e293b; padding: 15px; text-align: center;
            border-bottom: 4px solid #38bdf8; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        header h1 { color: #38bdf8; letter-spacing: 3px; font-size: 32px; }

        /* O'yinlar maydoni */
        .portal-wrapper {
            width: 100%;
            height: calc(100vh - 75px);
            background: #000;
        }

        /* Bu API blokirovkalarni aylanib o'tish uchun maxsus tayyorlangan */
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>YUSUFGAME</h1>
    </header>

    <div class="portal-wrapper">
        <iframe id="game-frame" src="https://catalog.gamedistribution.com/u/yusufgame/?v=1" allowfullscreen></iframe>
    </div>

</body>
</html>
