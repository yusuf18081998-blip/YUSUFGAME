<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | Portal</title>
    
    <script src="https://sdk.games.s3.yandex.net/sdk.js"></script>

    <style>
        :root { --neon: #00fff2; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        header { background: #16213e; padding: 15px; text-align: center; border-bottom: 4px solid var(--neon); }
        h1 { color: var(--neon); letter-spacing: 5px; margin: 0; }

        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .card {
            background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155;
            cursor: pointer; transition: 0.3s; text-align: center; font-weight: bold;
        }
        .card:hover { transform: scale(1.05); border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* O'yin oynasi - o'z saytingiz ichida qolishi uchun */
        #game-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .back-button {
            position: absolute; top: 10px; left: 10px; background: var(--neon);
            color: #000; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 10000;
        }
    </style>
</head>
<body>

<header>
    <h1>YUSUFGAME</h1>
    <small id="sdk-info">SDK ulanmoqda...</small>
</header>

<div class="container">
    <div class="card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=37754b0394014977936166164d1f563d')">🤺 STICKMAN</div>
    <div class="card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=4842cc7a9504446487593c20058b883d')">🏍️ MOTO X3M</div>
    <div class="card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=6078e88931104336a5a3a27f677d2d14')">🏃 SUBWAY</div>
    <div class="card" onclick="openGame('https://html5.api.gamedistribution.com/main.html?gameid=9928509c132f41858a74e5428614660e')">🎱 8 BALL POOL</div>
</div>

<div id="game-container">
    <div class="back-button" onclick="closeGame()">← ORQAGA</div>
    <iframe id="game-frame" src="" allow="autoplay; fullscreen; keyboard"></iframe>
</div>

<script>
    let ysdk;

    // Hujjat bo'yicha SDK-ni to'g'ri inicializatsiya qilish
    async function initYandexSDK() {
        try {
            ysdk = await YaGames.init(); //
            document.getElementById('sdk-info').innerText = "Tizim tayyor ✅";
            console.log('Yandex SDK Initialized');
        } catch (e) {
            console.warn('SDK yuklanmadi, lekin ochiq rejimda ishlaydi');
            document.getElementById('sdk-info').innerText = "Offline rejim";
        }
    }

    initYandexSDK();

    function openGame(url) {
        const frame = document.getElementById('game-frame');
        const container = document.getElementById('game-container');
        
        frame.src = url;
        container.style.display = 'block';

        // Hujjatda aytilganidek, o'yin boshlanganda to'liq ekranga o'tish imkonini beradi
        if (ysdk) {
            ysdk.features.LoadingProgress.report(100);
        }
    }

    function closeGame() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }
</script>

</body>
</html>
