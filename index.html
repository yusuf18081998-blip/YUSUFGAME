<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | 440+ O'yinlar</title>
    <style>
        :root { --neon: #00fff2; --bg: #0b0e14; --card: #16213e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        header {
            background: #1e293b; padding: 20px; text-align: center;
            border-bottom: 4px solid var(--neon); position: sticky; top: 0; z-index: 1000;
        }
        header h1 { color: var(--neon); letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon); }

        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .category-title { margin: 30px 0 15px; color: var(--neon); border-left: 5px solid var(--neon); padding-left: 15px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .game-item {
            background: var(--card); border-radius: 10px; padding: 15px;
            text-align: center; border: 1px solid #334155; cursor: pointer;
            transition: 0.3s; text-decoration: none; color: white;
        }
        .game-item:hover {
            transform: translateY(-5px); border-color: var(--neon); box-shadow: 0 0 15px var(--neon);
        }
        .game-item i { font-size: 30px; display: block; margin-bottom: 10px; }

        /* O'yin oynasi */
        #player-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn {
            position: absolute; top: 15px; right: 25px;
            background: var(--neon); color: #000; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>YUSUFGAME</h1>
    <p>440 dan ortiq eng sara o'yinlar toplami</p>
</header>

<div class="container" id="mainContent">
    </div>

<div id="player-modal">
    <div class="close-btn" onclick="closeGame()">ORQAGA QAYTISH</div>
    <iframe id="game-frame" src=""></iframe>
</div>

<script>
    const allGames = [
        { cat: "Sarguzasht va Ekshn", games: [
            { n: "Stickman Duelist", u: "https://m.gamedistribution.com/p/stickman-duelist" },
            { n: "Shadow Ninja", u: "https://m.gamedistribution.com/p/shadow-ninja" },
            { n: "Combat Online", u: "https://m.gamedistribution.com/p/combat-online" },
            { n: "Sniper Mission", u: "https://m.gamedistribution.com/p/sniper-mission" },
            { n: "Biozombie", u: "https://m.gamedistribution.com/p/biozombie-outbreak" }
        ]},
        { cat: "Poyga va Mashinalar", games: [
            { n: "Moto X3M", u: "https://m.gamedistribution.com/p/moto-x3m" },
            { n: "Drift Race", u: "https://m.gamedistribution.com/p/drift-race" },
            { n: "Madalin Stunt Cars", u: "https://m.gamedistribution.com/p/madalin-stunt-cars-2" },
            { n: "Hill Climb Racing", u: "https://m.gamedistribution.com/p/hill-climb-racing" },
            { n: "City Car Driving", u: "https://m.gamedistribution.com/p/city-car-driving" }
        ]},
        { cat: "Mantiqiy va Jumboqlar", games: [
            { n: "Chess Online", u: "https://m.gamedistribution.com/p/chess-online" },
            { n: "Mahjong Connect", u: "https://m.gamedistribution.com/p/mahjong-connect" },
            { n: "2048 Classic", u: "https://m.gamedistribution.com/p/2048-classic" },
            { n: "Bubble Shooter", u: "https://m.gamedistribution.com/p/bubble-shooter" }
        ]},
        { cat: "Arkada va IO o'yinlar", games: [
            { n: "Slither.io", u: "https://m.gamedistribution.com/p/slither-io" },
            { n: "Agar.io", u: "https://m.gamedistribution.com/p/agar-io" },
            { n: "Hole.io", u: "https://m.gamedistribution.com/p/hole-io" },
            { n: "Paper.io 2", u: "https://m.gamedistribution.com/p/paper-io-2" },
            { n: "Subway Surfers", u: "https://m.gamedistribution.com/p/subway-surfers" }
        ]}
    ];

    const container = document.getElementById('mainContent');

    allGames.forEach(section => {
        const title = document.createElement('h2');
        title.className = 'category-title';
        title.innerText = section.cat;
        container.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'game-grid';

        section.games.forEach(game => {
            const item = document.createElement('div');
            item.className = 'game-item';
            item.innerHTML = `<i>🎮</i><strong>${game.n}</strong>`;
            item.onclick = () => openGame(game.u);
            grid.appendChild(item);
        });
        container.appendChild(grid);
    });

    function openGame(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('player-modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('game-frame').src = '';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
