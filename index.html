<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | 1000+ TOP O'yinlar</title>
    <style>
        /* Umumiy ko'rinish */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0b0e14; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Navigatsiya paneli */
        header {
            background: linear-gradient(90deg, #16213e, #0f3460);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 4px solid #00fff2;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.3);
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #00fff2;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00fff2;
        }

        .stats {
            background: rgba(0, 255, 242, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #00fff2;
            font-size: 14px;
        }

        /* O'yinlar konteyneri */
        .game-viewport {
            width: 100%;
            height: calc(100vh - 70px);
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Yuklanish effekti */
        .loader {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #00fff2;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">YUSUFGAME</div>
        <div class="stats">Siz uchun 1000+ o'yin tayyor!</div>
    </header>

    <div class="game-viewport">
        <iframe src="https://html5.api.gamedistribution.com/main.html" 
                allowfullscreen 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>

    <div class="loader">Tizim barqaror ishlamoqda...</div>

</body>
