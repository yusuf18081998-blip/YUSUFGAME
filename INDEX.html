\<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUSUFGAME | Mega O'yinlar Markazi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --purple: #bc13fe; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }
        
        header { padding: 40px; text-align: center; border-bottom: 2px solid var(--neon); background: #111; box-shadow: 0 0 20px rgba(0,255,204,0.3); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .stat-box { display: inline-block; margin-top: 15px; padding: 10px 20px; border: 1px solid var(--purple); border-radius: 30px; font-size: 1.2rem; background: rgba(188, 19, 254, 0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 40px; max-width: 1400px; margin: auto; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 25px; text-align: center; transition: 0.3s; cursor: pointer; border: 1px solid #333; position: relative; }
        .card:hover { transform: scale(1.07); border-color: var(--neon); box-shadow: 0 0 25px rgba(0,255,204,0.2); }
        .card i { font-size: 50px; display: block; margin-bottom: 15px; }

        /* Game Arena */
        #arena { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #111; border: 2px solid var(--neon); padding: 40px; border-radius: 20px; width: 90%; max-width: 600px; text-align: center; box-shadow: 0 0 40px var(--neon); }
        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        button.opt { background: transparent; border: 1.5px solid var(--purple); color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        button.opt:hover { background: var(--purple); box-shadow: 0 0 15px var(--purple); }
        .close { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>YUSUFIGRI</h1>
    <div class="stat-box">Ball: <span id="score">0</span> XP</div>
</header>

<div class="grid" id="main-grid"></div>

<div id="arena">
    <span class="close" onclick="exit()">&times;</span>
    <div class="box">
        <h2 id="a-title" style="color: var(--neon);">FAN</h2>
        <p id="a-q" style="font-size: 1.8rem; margin: 30px 0;"></p>
        <div class="opts" id="a-opts"></div>
        <div id="msg" style="margin-top: 20px; font-weight: bold;"></div>
    </div>
</div>

<script>
    let score = 0;
    const fanlar = [
        {n: "Matematika", t: "math", i: "➕"}, {n: "Informatika", t: "it", i: "💻"},
        {n: "Ingliz tili", t: "eng", i: "🇬🇧"}, {n: "Tarix", t: "hist", i: "🏺"},
        {n: "Biologiya", t: "bio", i: "🧬"}, {n: "Kimyo", t: "chem", i: "🧪"},
        {n: "Fizika", t: "phys", i: "⚛️"}, {n: "Geografiya", t: "geo", i: "🌍"},
        {n: "Ona tili", t: "uzb", i: "✍️"}, {n: "Adabiyot", t: "book", i: "📚"},
        {n: "Astronomiya", t: "astro", i: "🪐"}, {n: "Mantiq", t: "iq", i: "🧠"},
        {n: "Iqtisod", t: "eco", i: "📈"}, {n: "Huquq", t: "law", i: "⚖️"},
        {n: "San'at", t: "art", i: "🎨"}, {n: "Sport", t: "sport", i: "🏀"},
        {n: "Texnika", t: "tech", i: "⚙️"}, {n: "Musiqa", t: "music", i: "🎵"},
        {n: "Hayvonot", t: "zoo", i: "🦁"}, {n: "Kosmos", t: "space", i: "🚀"}
    ];

    // --- KATTA SAVOLLAR BAZASI ---
    const database = {
        it: [
            {q: "Siz ko'rib turgan ushbu sayt qaysi tilda yozilgan?", a: "HTML", o: ["HTML", "C++", "Java", "Python"]},
            {q: "Dasturlashda eng ko'p ishlatiladigan 'Loop' nomi?", a: "For", o: ["For", "If", "Variable", "Link"]},
            {q: "Brauzerda sahifani yangilash tugmasi?", a: "F5", o: ["F5", "F1", "F12", "F2"]},
            {q: "Google asoschisi kim?", a: "Larry Page", o: ["Larry Page", "Elon Musk", "Bill Gates", "Mark Zuckerberg"]}
        ],
        eng: [
            {q: "Tarjimasi: 'Knowledge'", a: "Bilim", o: ["Bilim", "Kitob", "Maktab", "Qalam"]},
            {q: "Opposite of 'Fast'?", a: "Slow", o: ["Slow", "Big", "Quick", "Smart"]},
            {q: "I ___ a student.", a: "am", o: ["am", "is", "are", "be"]}
        ],
        hist: [
            {q: "Amir Temur nechanchi yilda tug'ilgan?", a: "1336", o: ["1336", "1405", "1370", "1221"]},
            {q: "O'zbekiston mustaqillik kuni?", a: "1-sentabr", o: ["1-sentabr", "8-dekabr", "21-mart", "1-iyun"]}
        ],
        bio: [
            {q: "Yurak nechta kameradan iborat?", a: "4 ta", o: ["4 ta", "2 ta", "3 ta", "6 ta"]},
            {q: "O'simliklar havoga nima chiqaradi?", a: "Kislorod", o: ["Kislorod", "Azot", "Uglerod", "Vodorod"]}
        ],
        geo: [
            {q: "Eng katta okean?", a: "Tinch", o: ["Tinch", "Atlantika", "Hind", "Shimoliy"]},
            {q: "Dunyo aholisi eng ko'p davlat?", a: "Hindiston", o: ["Hindiston", "Xitoy", "AQSH", "Rossiya"]}
        ]
        // Barcha fanlar uchun shunday massivlar davom etadi...
    };

    const grid = document.getElementById('main-grid');
    fanlar.forEach(f => {
        grid.innerHTML += `<div class="card" onclick="openGame('${f.t}', '${f.n}')"><i>${f.i}</i><h3>${f.n}</h3></div>`;
    });

    function openGame(t, n) {
        document.getElementById('arena').style.display = 'flex';
        document.getElementById('a-title').innerText = n;
        loadQuestion(t);
    }

    function loadQuestion(t) {
        let qText = "", ans = "", options = [];

        if(t === 'math') {
            let n1 = Math.floor(Math.random()*100), n2 = Math.floor(Math.random()*50);
            qText = `${n1} + ${n2} = ?`; ans = n1+n2; options = [ans, ans+5, ans-2, ans+10];
        } 
        else if(database[t]) {
            let db = database[t];
            let item = db[Math.floor(Math.random()*db.length)];
            qText = item.q; ans = item.a; options = item.o;
        } 
        else {
            qText = "Ushbu fan uchun savollar bazasi yuklanmoqda..."; ans = "Ok"; options = ["Ok", "Kutish", "Yopish", "Keyingisi"];
        }

        options.sort(() => Math.random() - 0.5);
        document.getElementById('a-q').innerText = qText;
        document.getElementById('a-opts').innerHTML = options.map(o => `<button class="opt" onclick="check('${o}', '${ans}', '${t}')">${o}</button>`).join('');
    }

    function check(u, c, t) {
        let m = document.getElementById('msg');
        if(u == c) {
            score += 100; document.getElementById('score').innerText = score;
            m.innerText = "BARAKALLA! 🎉"; m.style.color = "var(--neon)";
            setTimeout(() => { m.innerText = ""; loadQuestion(t); }, 1000);
        } else {
            m.innerText = "XATO! ❌"; m.style.color = "red";
        }
    }

    function exit() { document.getElementById('arena').style.display = 'none'; }
</script>

</body>
</html>
